modules:
  default:
    tcl:
      exclude_implicits: false
      hash_length: 5
      naming_scheme: '{name}/{version}-{compiler.name}-{compiler.version}'
      all:
        environment:
          set:
            '{name}_ROOT': '{prefix}'
      gcc:
        environment:
          prepend_path:
            LD_LIBRARY_PATH: '{prefix}/lib64'
      hpcx-wrap:
        environment:
          set:
            HPCX_HOME: '{prefix}'
          prepend_path:
            LD_LIBRARY_PATH: '{prefix}/ompi/lib'
      occa:
        environment:
          prepend_path:
            LD_LIBRARY_PATH: '{prefix}/lib'
      # python:
      #   environment:
      #     append_path:
      #       PYTHONPATH : 'CTC_SETUP_DIR/pipmods/lib64/python3.11/site-packages'
