packages:
  all:
    # require:
    #   - "%gcc@11.5.0"  
    target: [x86_64]
    permissions:
      read: world
      write: user
  mpi:
    require: 'hpcx-wrap'
  cuda:
    externals:
    - spec: cuda@12.8.1
      prefix: /usr/local/cuda-12.8
    buildable: false
  python:
    externals:
    - spec: python@3.9.21  # Rocky 9 default is usually 3.9.x
      prefix: /usr
    buildable: false    
  openssl:
    externals:
    - spec: openssl@3.0.7
      prefix: /usr
    buildable: false
  zlib:
    externals:
    - spec: zlib@1.2.11
      prefix: /usr
    buildable: false
  bzip2:
    externals:
    - spec: bzip2@1.0.8
      prefix: /usr
    buildable: false
  xz:
    externals:
    - spec: xz@5.2.5
      prefix: /usr
    buildable: false
  zstd:
    externals:
    - spec: zstd@1.5.1
      prefix: /usr
    buildable: false
  ncurses:
    externals:
    - spec: ncurses@6.2
      prefix: /usr
    buildable: false
  readline:
    externals:
    - spec: readline@8.1
      prefix: /usr
    buildable: false
  curl:
    externals:
    - spec: curl@7.76.1
      prefix: /usr
    buildable: false
  # now the stuff to install
  hpcx-wrap:
    require: '@99.99'
  cmake:
    require: '@3.26.6'
  py-numpy:
    require: '@2.0.2'
  occa:
    require: '@2.0.0'
